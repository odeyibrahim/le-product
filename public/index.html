<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V. Gallery · shop + originals</title>
    
    <link href="https://fonts.cdnfonts.com/css/copperplate" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-primary: #000;
            --color-secondary: #D0A380;
            --color-light: #f8f8f8;
            --color-gray-light: #eee;
            --color-gray: #888;
            --color-gray-dark: #555;
            --nav-height: 60px;
            --color-success: #2e7d32;
            --color-error: #c62828;
            --color-warning: #ed6c02;
        }
        
        body {
            font-family: 'Copperplate', serif;
            background: #fff;
            color: #333;
            overflow: hidden;
            height: 100vh;
            line-height: 1.5;
        }
        
        /* Intro Overlay */
        .intro-overlay {
            position: fixed; inset: 0; background: #fff; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        .intro-overlay.hidden { opacity: 0; pointer-events: none; }
        .enter-gallery {
            background: none; border: 1px solid #000; padding: 12px 32px;
            font-family: inherit; cursor: pointer; transition: all 0.3s;
        }
        .enter-gallery:hover { background: #000; color: #fff; }
        
        /* Split Container */
        .split-container {
            display: grid;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .split-container.active { opacity: 1; }
        
        /* Top Half */
        .product-half {
            padding: 40px;
            padding-top: 80px;
            padding-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f8f8;
            position: relative;
            min-height: 0;
            height: 100%;
        }
        
        .logo-container {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            cursor: pointer;
        }
        
        .grid-icon-top {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 16px;
            color: #888;
            cursor: pointer;
            padding: 8px;
        }
        
        .frame-container {
            width: 100%;
            height: 100%;
            max-width: min(500px, 90vh);
            max-height: min(500px, 90vh);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-frame {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.6s ease;
        }
        .product-frame.zoom-active { transform: scale(1.5); z-index: 100; }
        .product-frame.has-frame { border: 5px solid #2c2c2c; padding: 5px; }
        .product-image { width: 100%; height: 100%; object-fit: contain; }
        
        /* Bottom Half */
        .info-half {
            background: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: clamp(20px,5vh,40px) clamp(20px,5vh,40px) calc(var(--nav-height) + 20px);
            min-height: 0;
            height: 100%;
        }
        
        .info-container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .product-title { font-size: 14px; }
        .description { font-size: 11px; color: #555; line-height: 1.4; white-space: pre-line; max-height: 120px; overflow-y: auto; }
        
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 10px 0;
        }
        
        .action-btn {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            color: #888;
        }
        .action-btn:hover { background: #eee; }
        .action-btn.saved { color: #e25555; }
        
        .price-tag { font-size: 13px; font-family: monospace; }
        
        .stock-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
        }
        .stock-badge.in-stock { background: #e8f5e9; color: #2e7d32; }
        .stock-badge.sold-out { background: #ffebee; color: #c62828; }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(248,248,248,0.95);
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }
        
        .nav-arrows { display: flex; gap: 15px; }
        .arrow-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 8px;
            color: #555;
        }
        .arrow-btn:disabled { color: #ccc; }
        
        .currency-badge {
            font-size: 11px;
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }
        
        /* Grid Overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 2000;
            display: none;
            overflow-y: auto;
            padding: 20px;
        }
        .grid-overlay.active { display: block; }
        
        .grid-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .grid-filters { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn {
            background: none;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 11px;
        }
        .filter-btn.active { border-bottom: 1px solid #000; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .grid-item { cursor: pointer; }
        .grid-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        .grid-item-info {
            padding: 8px 0;
            font-size: 11px;
        }
        .grid-item-info.hidden { display: none; }
        
        /* Checkout Panel */
        .checkout-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            display: none;
        }
        .checkout-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 90%;
            max-width: 500px;
            height: 100%;
            background: white;
            z-index: 3001;
            overflow-y: auto;
            padding: 30px;
            transition: right 0.3s;
        }
        .checkout-panel.active { right: 0; }
        
        .payment-buttons { display: flex; gap: 10px; margin: 20px 0; }
        .paystack-btn, .nomba-btn {
            flex: 1;
            padding: 16px;
            color: #fff;
            border: none;
            font-size: 12px;
            cursor: pointer;
        }
        .paystack-btn { background: #000; }
        .nomba-btn { background: #1a4d8c; }
        
        .shipping-option {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border: 1px solid #ddd;
            margin: 5px 0;
            cursor: pointer;
        }
        .shipping-option.selected { border-color: #000; background: #f8f8f8; }
        
        /* Loading */
        .loading {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .loading.active { display: flex; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid #eee;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 1s infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #000;
            color: #fff;
            padding: 12px 24px;
            z-index: 9000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s;
        }
        .notification.active { opacity: 1; transform: translateX(0); }
        .notification.success { background: #2e7d32; }
        .notification.error { background: #c62828; }
        
        .share-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3500;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .share-overlay.active { display: flex; }
        .share-container {
            background: white;
            padding: 20px;
            border-radius: 4px;
            max-width: 90%;
        }
        .share-image { max-width: 100%; max-height: 60vh; margin-bottom: 20px; }
        
        @media (max-width: 768px) {
            .grid-container { grid-template-columns: repeat(3, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="intro-overlay" id="introOverlay">
        <div style="text-align:center;">
            <div style="margin-bottom:40px;">In the space between sight and sense...<br>To witness is to create</div>
            <div style="margin-bottom:50px;">V.</div>
            <button class="enter-gallery" id="enterGalleryBtn">Enter Shop</button>
        </div>
    </div>
    
    <div class="loading" id="loading"><div class="spinner"></div></div>
    <div class="notification" id="notification"></div>
    
    <div class="share-overlay" id="shareOverlay">
        <div class="share-container">
            <img id="shareImage" class="share-image">
            <div class="share-actions" style="display:flex; gap:10px; justify-content:center;">
                <button class="admin-btn" id="downloadShareBtn" style="background:#000;color:#fff;border:none;padding:8px16px;">Download</button>
                <button class="admin-btn" id="closeShareBtn" style="background:#000;color:#fff;border:none;padding:8px16px;">Close</button>
            </div>
        </div>
    </div>
    
    <div class="split-container" id="splitContainer">
        <div class="product-half">
            <div class="logo-container" id="logoContainer">V.</div>
            <button class="grid-icon-top" id="gridIconBtn">☷</button>
            <div class="frame-container">
                <div class="product-frame" id="productFrame">
                    <img src="" class="product-image" id="mainImage">
                </div>
            </div>
        </div>
        
        <div class="info-half">
            <div class="info-container">
                <div class="product-title" id="productTitle">-</div>
                <div class="description" id="descriptionText">Loading...</div>
                <div class="action-bar">
                    <button class="action-btn" id="heartButton">♡</button>
                    <button class="action-btn" id="buyNowBtn">🛒</button>
                    <button class="action-btn" id="shareButton">↗</button>
                    <div>
                        <span class="price-tag" id="priceTag"></span>
                        <span class="stock-badge" id="stockBadge"></span>
                    </div>
                </div>
            </div>
        </div>
        
        <nav class="bottom-nav">
            <div>
                <span class="currency-badge" id="currencyDisplay">USD</span>
            </div>
            <div class="nav-arrows">
                <button class="arrow-btn" id="prevBtn" disabled>‹</button>
                <span id="pageIndicator" style="min-width:40px;text-align:center;">1/1</span>
                <button class="arrow-btn" id="nextBtn">›</button>
            </div>
        </nav>
    </div>
    
    <div class="grid-overlay" id="gridOverlay">
        <div class="grid-header">
            <div class="grid-filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="original">Originals</button>
                <button class="filter-btn" data-filter="print">Prints</button>
                <button class="filter-btn" data-filter="merch">Merch</button>
                <button class="filter-btn" data-filter="craft">Craft</button>
                <button class="filter-btn" data-filter="saved">♡ Saved</button>
                <button class="eye-toggle" id="toggleDetailsBtn" style="background:none;border:none;font-size:14px;cursor:pointer;">👁</button>
            </div>
            <button class="admin-btn" id="closeGridBtn" style="background:none;border:none;font-size:20px;cursor:pointer;">←</button>
        </div>
        <div class="grid-container" id="gridContainer"></div>
    </div>
    
    <div class="checkout-overlay" id="checkoutOverlay"></div>
    <div class="checkout-panel" id="checkoutPanel">
        <h2>Checkout</h2>
        <div id="checkoutProductPreview"></div>
        <div style="display:flex; gap:10px; margin:20px 0;">
            <button id="decreaseQtyBtn" style="width:40px;">-</button>
            <span id="checkoutQuantity" style="min-width:40px;text-align:center;">1</span>
            <button id="increaseQtyBtn" style="width:40px;">+</button>
        </div>
        <div style="background:#f5f5f5; padding:15px; margin:20px 0;">
            <div style="display:flex; justify-content:space-between;"><span>Total:</span><span id="checkoutTotal"></span></div>
        </div>
        <input type="text" id="checkoutName" placeholder="Full Name" style="width:100%; padding:10px; margin:5px 0;">
        <input type="email" id="checkoutEmail" placeholder="Email" style="width:100%; padding:10px; margin:5px 0;">
        <input type="text" id="checkoutAddress" placeholder="Address" style="width:100%; padding:10px; margin:5px 0;">
        <div class="shipping-options" id="shippingOptions">
            <div class="shipping-option selected" data-shipping="standard"><span>Standard ($7)</span><input type="radio" name="shipping" value="standard" checked></div>
            <div class="shipping-option" data-shipping="express"><span>Express ($15)</span><input type="radio" name="shipping" value="express"></div>
        </div>
        <div class="payment-buttons">
            <button class="paystack-btn" id="paystackBtn">Pay with Paystack</button>
            <button class="nomba-btn" id="nombaBtn">Pay with Nomba</button>
        </div>
        <button class="admin-btn" id="closeCheckoutBtn" style="width:100%; margin-top:10px; background:none;border:1px solid #ddd;padding:10px;">Close</button>
    </div>
    
    <script>
        class VGalleryApp {
            constructor() {
                this.products = [];
                this.currentIndex = 0;
                this.savedItems = new Set();
                this.selectedCurrency = 'USD';
                this.exchangeRates = { USD: 1, EUR: 0.92, GBP: 0.79, NGN: 1500 };
                this.checkoutQuantity = 1;
                this.selectedShipping = 'standard';
                this.zoomActive = false;
                this.gridDetailsVisible = true;
                this.init();
            }
            
            async init() {
                this.bindElements();
                this.bindEvents();
                await this.loadProducts();
                this.loadSavedItems();
                this.loadCurrency();
                this.setupSwipe();
                this.showIntro();
            }
            
            bindElements() {
                this.el = {
                    introOverlay: document.getElementById('introOverlay'),
                    splitContainer: document.getElementById('splitContainer'),
                    mainImage: document.getElementById('mainImage'),
                    productFrame: document.getElementById('productFrame'),
                    productTitle: document.getElementById('productTitle'),
                    descriptionText: document.getElementById('descriptionText'),
                    priceTag: document.getElementById('priceTag'),
                    stockBadge: document.getElementById('stockBadge'),
                    heartButton: document.getElementById('heartButton'),
                    buyNowBtn: document.getElementById('buyNowBtn'),
                    shareButton: document.getElementById('shareButton'),
                    prevBtn: document.getElementById('prevBtn'),
                    nextBtn: document.getElementById('nextBtn'),
                    pageIndicator: document.getElementById('pageIndicator'),
                    currencyDisplay: document.getElementById('currencyDisplay'),
                    loading: document.getElementById('loading'),
                    notification: document.getElementById('notification'),
                    gridOverlay: document.getElementById('gridOverlay'),
                    gridContainer: document.getElementById('gridContainer'),
                    gridIconBtn: document.getElementById('gridIconBtn'),
                    closeGridBtn: document.getElementById('closeGridBtn'),
                    toggleDetailsBtn: document.getElementById('toggleDetailsBtn'),
                    checkoutOverlay: document.getElementById('checkoutOverlay'),
                    checkoutPanel: document.getElementById('checkoutPanel'),
                    closeCheckoutBtn: document.getElementById('closeCheckoutBtn'),
                    checkoutProductPreview: document.getElementById('checkoutProductPreview'),
                    checkoutQuantity: document.getElementById('checkoutQuantity'),
                    checkoutTotal: document.getElementById('checkoutTotal'),
                    checkoutName: document.getElementById('checkoutName'),
                    checkoutEmail: document.getElementById('checkoutEmail'),
                    checkoutAddress: document.getElementById('checkoutAddress'),
                    decreaseQtyBtn: document.getElementById('decreaseQtyBtn'),
                    increaseQtyBtn: document.getElementById('increaseQtyBtn'),
                    paystackBtn: document.getElementById('paystackBtn'),
                    nombaBtn: document.getElementById('nombaBtn'),
                    shareOverlay: document.getElementById('shareOverlay'),
                    shareImage: document.getElementById('shareImage'),
                    downloadShareBtn: document.getElementById('downloadShareBtn'),
                    closeShareBtn: document.getElementById('closeShareBtn'),
                    logoContainer: document.getElementById('logoContainer')
                };
            }
            
            bindEvents() {
                document.getElementById('enterGalleryBtn').onclick = () => this.enterGallery();
                this.el.prevBtn.onclick = () => this.prevProduct();
                this.el.nextBtn.onclick = () => this.nextProduct();
                this.el.heartButton.onclick = () => this.toggleSave();
                this.el.buyNowBtn.onclick = () => this.openCheckout();
                this.el.shareButton.onclick = () => this.shareProduct();
                this.el.gridIconBtn.onclick = () => this.openGrid();
                this.el.closeGridBtn.onclick = () => this.closeGrid();
                this.el.toggleDetailsBtn.onclick = () => this.toggleGridDetails();
                this.el.closeCheckoutBtn.onclick = () => this.closeCheckout();
                this.el.checkoutOverlay.onclick = () => this.closeCheckout();
                this.el.decreaseQtyBtn.onclick = () => this.updateQuantity(-1);
                this.el.increaseQtyBtn.onclick = () => this.updateQuantity(1);
                this.el.paystackBtn.onclick = () => this.processPayment('paystack');
                this.el.nombaBtn.onclick = () => this.processPayment('nomba');
                this.el.downloadShareBtn.onclick = () => this.downloadShare();
                this.el.closeShareBtn.onclick = () => this.closeShare();
                this.el.productFrame.onclick = () => this.toggleZoom();
                this.el.currencyDisplay.onclick = () => this.cycleCurrency();
                
                document.querySelectorAll('.shipping-option').forEach(opt => {
                    opt.onclick = () => {
                        this.selectedShipping = opt.dataset.shipping;
                        document.querySelectorAll('.shipping-option').forEach(o => o.classList.remove('selected'));
                        opt.classList.add('selected');
                        this.updateCheckoutSummary();
                    };
                });
                
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.onclick = () => this.filterGrid(btn.dataset.filter);
                });
            }
            
            async loadProducts() {
                this.showLoading(true);
                try {
                    const response = await fetch('/.netlify/functions/get-products');
                    this.products = await response.json();
                    if (!this.products.length) throw new Error();
                    this.updateProductDisplay();
                } catch (error) {
                    this.products = [
                        { id: '1', product_id: 'prod_001', title: 'Archive Tee', description: 'Archive Tee — a relic of soft cotton.\nScreen printed by hand in Los Angeles.', type: 'merch', base_price: 45, stock: 10, image_url: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800' },
                        { id: '2', product_id: 'prod_002', title: 'Desert Landscape', description: 'Archival photograph from the high desert.', type: 'print', base_price: 195, stock: 5, image_url: 'https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=800', frame_style: { color: 'white', width: 5 } },
                        { id: '3', product_id: 'prod_003', title: 'Silent Currents', description: 'Original mixed media on canvas.', type: 'original', base_price: 8500, stock: 1, image_url: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=800', frame_style: { color: '#2c2c2c', width: 8 } },
                        { id: '4', product_id: 'prod_004', title: 'Handwoven Wall Hanging', description: 'Natural fibers dyed with plants.', type: 'craft', base_price: 380, stock: 2, image_url: 'https://images.unsplash.com/photo-1513519245088-0e12902e35ca?w=800' }
                    ];
                    this.updateProductDisplay();
                } finally {
                    this.showLoading(false);
                }
            }
            
            loadSavedItems() {
                const saved = localStorage.getItem('vgallery_saved');
                if (saved) this.savedItems = new Set(JSON.parse(saved));
            }
            
            loadCurrency() {
                const saved = localStorage.getItem('vgallery_currency');
                if (saved) { this.selectedCurrency = saved; this.el.currencyDisplay.textContent = saved; }
            }
            
            updateProductDisplay() {
                const p = this.products[this.currentIndex];
                if (!p) return;
                this.el.mainImage.src = p.image_url;
                this.el.productTitle.textContent = p.title;
                this.el.descriptionText.textContent = p.description;
                this.el.priceTag.textContent = this.formatPrice(p.base_price);
                if (p.stock <= 0) { this.el.stockBadge.textContent = 'Sold Out'; this.el.stockBadge.className = 'stock-badge sold-out'; }
                else if (p.stock <= 2) { this.el.stockBadge.textContent = `Low Stock (${p.stock})`; this.el.stockBadge.className = 'stock-badge low-stock'; }
                else { this.el.stockBadge.textContent = 'In Stock'; this.el.stockBadge.className = 'stock-badge in-stock'; }
                this.el.heartButton.classList.toggle('saved', this.savedItems.has(p.product_id));
                this.el.heartButton.innerHTML = this.savedItems.has(p.product_id) ? '♥' : '♡';
                this.el.pageIndicator.textContent = `${this.currentIndex + 1}/${this.products.length}`;
                this.el.prevBtn.disabled = this.currentIndex === 0;
                this.el.nextBtn.disabled = this.currentIndex === this.products.length - 1;
                if (p.frame_style && Object.keys(p.frame_style).length > 0) {
                    this.el.productFrame.classList.add('has-frame');
                    this.el.productFrame.style.borderColor = p.frame_style.color || '#2c2c2c';
                    this.el.productFrame.style.borderWidth = (p.frame_style.width || 5) + 'px';
                } else { this.el.productFrame.classList.remove('has-frame'); }
            }
            
            formatPrice(usd) {
                const rate = this.exchangeRates[this.selectedCurrency] || 1;
                const symbols = { USD: '$', EUR: '€', GBP: '£', NGN: '₦' };
                return (symbols[this.selectedCurrency] || '$') + (usd * rate).toFixed(2);
            }
            
            cycleCurrency() {
                const currencies = ['USD', 'EUR', 'GBP', 'NGN'];
                const idx = (currencies.indexOf(this.selectedCurrency) + 1) % currencies.length;
                this.selectedCurrency = currencies[idx];
                localStorage.setItem('vgallery_currency', this.selectedCurrency);
                this.el.currencyDisplay.textContent = this.selectedCurrency;
                this.updateProductDisplay();
            }
            
            toggleSave() {
                const p = this.products[this.currentIndex];
                if (this.savedItems.has(p.product_id)) {
                    this.savedItems.delete(p.product_id);
                    this.showNotification('Removed from saved');
                } else {
                    this.savedItems.add(p.product_id);
                    this.showNotification('Added to saved');
                }
                localStorage.setItem('vgallery_saved', JSON.stringify([...this.savedItems]));
                this.updateProductDisplay();
            }
            
            async shareProduct() {
                const p = this.products[this.currentIndex];
                this.showLoading(true);
                try {
                    if (navigator.share) { await navigator.share({ title: p.title, text: p.description }); }
                    else {
                        const canvas = await html2canvas(document.querySelector('.split-container'), { scale: 2, backgroundColor: '#fff', useCORS: true });
                        this.el.shareImage.src = canvas.toDataURL('image/png');
                        this.el.shareOverlay.classList.add('active');
                    }
                } catch(e) { this.showNotification('Share failed', 'error'); }
                finally { this.showLoading(false); }
            }
            
            downloadShare() { const a = document.createElement('a'); a.download = `${this.products[this.currentIndex].title}.png`; a.href = this.el.shareImage.src; a.click(); }
            closeShare() { this.el.shareOverlay.classList.remove('active'); }
            toggleZoom() { this.el.productFrame.classList.toggle('zoom-active'); }
            nextProduct() { if (this.currentIndex < this.products.length - 1) { this.currentIndex++; this.updateProductDisplay(); } }
            prevProduct() { if (this.currentIndex > 0) { this.currentIndex--; this.updateProductDisplay(); } }
            
            setupSwipe() {
                let startX = 0;
                document.addEventListener('touchstart', (e) => { if (this.isModalOpen()) return; startX = e.touches[0].clientX; });
                document.addEventListener('touchend', (e) => { if (this.isModalOpen()) return; const diff = e.changedTouches[0].clientX - startX; if (Math.abs(diff) > 50) { diff > 0 ? this.prevProduct() : this.nextProduct(); } });
            }
            
            isModalOpen() { return this.el.checkoutPanel.classList.contains('active') || this.el.gridOverlay.classList.contains('active') || this.el.shareOverlay.classList.contains('active'); }
            
            openGrid() { this.renderGrid('all'); this.el.gridOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
            closeGrid() { this.el.gridOverlay.classList.remove('active'); document.body.style.overflow = ''; }
            filterGrid(filter) { document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.filter === filter)); this.renderGrid(filter); }
            toggleGridDetails() { this.gridDetailsVisible = !this.gridDetailsVisible; document.querySelectorAll('.grid-item-info').forEach(el => el.classList.toggle('hidden', !this.gridDetailsVisible)); }
            
            renderGrid(filter) {
                let filtered = this.products;
                if (filter === 'saved') filtered = this.products.filter(p => this.savedItems.has(p.product_id));
                else if (filter !== 'all') filtered = this.products.filter(p => p.type === filter);
                this.el.gridContainer.innerHTML = filtered.map(p => `<div class="grid-item" onclick="app.viewProduct('${p.product_id}')"><img src="${p.image_url}"><div class="grid-item-info"><div class="grid-item-title">${p.title}</div><div class="grid-item-price">${this.formatPrice(p.base_price)}</div></div></div>`).join('');
            }
            
            viewProduct(productId) { const idx = this.products.findIndex(p => p.product_id === productId); if (idx !== -1) { this.currentIndex = idx; this.closeGrid(); this.updateProductDisplay(); } }
            
            openCheckout() {
                const p = this.products[this.currentIndex];
                if (p.stock <= 0) { this.showNotification('Sold out', 'error'); return; }
                this.checkoutQuantity = 1; this.el.checkoutQuantity.textContent = '1';
                this.el.checkoutProductPreview.innerHTML = `<div style="display:flex; gap:15px;"><img src="${p.image_url}" style="width:80px;height:80px;"><div><strong>${p.title}</strong><br>${this.formatPrice(p.base_price)}</div></div>`;
                this.updateCheckoutSummary();
                this.el.checkoutPanel.classList.add('active'); this.el.checkoutOverlay.classList.add('active'); document.body.style.overflow = 'hidden';
            }
            
            closeCheckout() { this.el.checkoutPanel.classList.remove('active'); this.el.checkoutOverlay.classList.remove('active'); document.body.style.overflow = ''; }
            
            updateQuantity(delta) {
                const p = this.products[this.currentIndex];
                const newQty = this.checkoutQuantity + delta;
                if (newQty >= 1 && newQty <= p.stock) { this.checkoutQuantity = newQty; this.el.checkoutQuantity.textContent = this.checkoutQuantity; this.updateCheckoutSummary(); }
            }
            
            updateCheckoutSummary() {
                const p = this.products[this.currentIndex];
                const isArt = p.type === 'original' || p.base_price > 1000;
                const shipping = isArt ? 0 : (this.selectedShipping === 'express' ? 15 : 7) * this.checkoutQuantity;
                const total = (p.base_price * this.checkoutQuantity) + shipping;
                this.el.checkoutTotal.textContent = this.formatPrice(total);
            }
            
            async processPayment(gateway) {
                const p = this.products[this.currentIndex];
                if (!this.el.checkoutName.value.trim() || !this.el.checkoutEmail.value.trim() || !this.el.checkoutAddress.value.trim()) {
                    this.showNotification('Please fill all fields', 'error'); return;
                }
                this.showLoading(true);
                const btn = gateway === 'paystack' ? this.el.paystackBtn : this.el.nombaBtn;
                btn.disabled = true; btn.textContent = 'Processing...';
                try {
                    const res = await fetch('/.netlify/functions/initialize-payment', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: this.el.checkoutEmail.value.trim(), name: this.el.checkoutName.value.trim(), productId: p.product_id, quantity: this.checkoutQuantity, shippingMethod: this.selectedShipping, address: this.el.checkoutAddress.value.trim(), paymentGateway: gateway })
                    });
                    const data = await res.json();
                    if (data.authorization_url) { window.location.href = data.authorization_url; }
                    else { throw new Error(data.error); }
                } catch(e) { this.showNotification(e.message, 'error'); this.showLoading(false); btn.disabled = false; btn.textContent = gateway === 'paystack' ? 'Pay with Paystack' : 'Pay with Nomba'; }
            }
            
            showIntro() { this.el.introOverlay.classList.remove('hidden'); this.el.splitContainer.classList.remove('active'); }
            enterGallery() { this.el.introOverlay.classList.add('hidden'); setTimeout(() => this.el.splitContainer.classList.add('active'), 300); }
            showLoading(show) { this.el.loading.classList.toggle('active', show); }
            showNotification(msg, type='success') { const n = this.el.notification; n.textContent = msg; n.className = `notification ${type}`; n.classList.add('active'); setTimeout(() => n.classList.remove('active'), 3000); }
        }
        
        window.app = new VGalleryApp();
    </script>
</body>
</html>
